infrastructure:
  - name: PostgreSQL
    service: postgresql@16-main
    host: prox-dev
    port: 5432
    level: system

  - name: Redis
    service: redis-server
    host: prox-dev
    port: 6379
    level: system

  - name: nginx
    service: nginx
    host: prox-dev
    port: 80
    level: system

  - name: fail2ban
    service: fail2ban
    host: prox-dev
    level: system

  - name: SSH
    service: ssh
    host: prox-dev
    port: 22
    level: system

  - name: SMB
    service: smbd
    host: prox-dev
    port: 445
    level: system

  - name: Grafana
    service: grafana-server
    host: prox-dev
    port: 3200
    level: system
    optional: true

  - name: Docker
    service: docker
    host: prox-dev
    level: system
    optional: true

