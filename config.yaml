server:
  port: 3301
  refresh_interval: 10s
  env: dev
  allowed_origins:
    - "*"  # dev mode — restrict to specific origins in production

ollama:
  enabled: true
  url: http://ollama:11434
  model: huihui_ai/qwen3-abliterated:14b

hosts:
  - name: prox-host
    host: 192.168.1.71
    ssh_user: root
    ssh_key: /home/dev/.ssh/id_rsa
    type: proxmox
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-dev
    host: 192.168.1.112
    ssh_user: dev
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-prod
    host: 192.168.1.113
    ssh_user: root
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-infra
    host: 192.168.1.202
    ssh_user: root
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

projects:
  - name: Cargo
    icon: truck
    description: "Биржа грузоперевозок 24tir.ru"
    purpose: "B2B-платформа: заказчики публикуют грузы, перевозчики берут заявки. Автоматический матчинг, тендеры, трекинг."
    urls:
      web: https://cargo.core-stack.ru
      api: https://cargo-api.core-stack.ru
    local_urls:
      web: http://cargo.local:8080
      api: http://api.cargo.local:3000
    accounts:
      - email: volkov@rosagro-trade.ru
        password: "Demo1234!"
        role: shipper
        note: Заказчик — РосАгроТрейд
      - email: petrov@autotrans-yug.ru
        password: "Demo1234!"
        role: carrier
        note: Перевозчик — АвтоТранс-Юг
      - email: morozov@morozov-trans.ru
        password: "Demo1234!"
        role: carrier
        note: Перевозчик — Морозов Транс
    services:
      system:
        - cargo-backend
        - cargo-sidekiq
        - cargo-anycable-rpc
        - anycable-go
    host: prox-dev

  - name: Fabro
    icon: factory
    description: "Калькуляторы для производств"
    purpose: "Мультиниша: 15 типов производств, 7 калькуляторов стоимости. Заказчик вводит параметры — получает цену и форму заявки."
    urls:
      web: https://fabro.core-stack.ru
      api: https://fabro-api.core-stack.ru
    local_urls:
      web: http://fabro.local:3031
      api: http://api.fabro.local:3030
    accounts:
      - email: admin@fabro.local
        password: "password123"
        role: admin
        note: Администратор
      - email: operator@fabro.local
        password: "password123"
        role: operator
        note: Оператор
      - email: customer@fabro.local
        password: "password123"
        role: customer
        note: Заказчик
      - email: supplier@fabro.local
        password: "password123"
        role: supplier
        note: Поставщик
    services:
      system:
        - fabro-api
        - fabro-sidekiq
      user:
        - fabro-web
    host: prox-dev

  - name: Puls
    icon: heart-pulse
    description: "Мониторинг транспорта"
    purpose: "Трекинг грузовиков в реальном времени: GPS-точки, маршруты, геозоны, уведомления диспетчеру."
    urls:
