    accounts:
      - email: admin@puls.local
        password: "password123"
        role: super_admin
        note: Супер-администратор
      - email: user@puls.local
        password: "password123"
        role: user
        note: Пользователь
    services:
      system:
        - puls-backend
    host: prox-dev

  - name: e-medic
    icon: stethoscope
    description: "Медицинская платформа"
    purpose: "Цифровизация клиник: расписание, приёмы, медкарты, интеграция с лабораториями и ФОМС."
