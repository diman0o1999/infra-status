server:
  port: 8090
  refresh_interval: 10s

kuma:
  enabled: true
  url: http://localhost:3003
  slug: core-stack

ollama:
  enabled: true
  url: http://ollama:11434
  model: huihui_ai/qwen3-abliterated:14b

hosts:
  - name: prox-host
    host: 192.168.1.71
    ssh_user: root
    ssh_key: /home/dev/.ssh/id_rsa
    type: proxmox
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-dev
    host: 192.168.1.112
    ssh_user: dev
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-infra
    host: 127.0.0.1
    ssh_user: dev
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

  - name: prox-prod
    host: 192.168.1.113
    ssh_user: dev
    ssh_key: /home/dev/.ssh/id_rsa
    type: vm
    thresholds:
      cpu_warn: 70
      cpu_crit: 90
      ram_warn: 80
      ram_crit: 95
      disk_warn: 80
      disk_crit: 95

projects:
  - name: Cargo
    icon: truck
    description: "Биржа грузоперевозок"
    urls:
      web: https://cargo.core-stack.ru
      api: https://cargo-api.core-stack.ru
    services:
      system:
        - cargo-backend
        - cargo-sidekiq
        - cargo-anycable-rpc
        - anycable-go
    host: prox-dev

  - name: Fabro
    icon: factory
    description: "Калькуляторы для производств"
    urls:
      web: https://fabro.core-stack.ru
      api: https://fabro-api.core-stack.ru
    services:
      user:
        - fabro-api
        - fabro-web
        - fabro-sidekiq
        - fabro-anycable-rpc
        - fabro-anycable-go
    host: prox-dev

  - name: Puls
    icon: heart-pulse
    description: "Мониторинг транспорта"
    urls:
      web: https://puls.core-stack.ru
      api: https://puls-api.core-stack.ru
    services:
      user:
        - puls-backend
        - puls-frontend
    host: prox-dev

  - name: e-medic
    icon: stethoscope
    description: "Медицинская платформа"
    urls:
      web: https://emedic.core-stack.ru
      api: https://emedic-api.core-stack.ru
    services:
      system:
        - emedic-api
        - emedic-web
        - emedic-queue
    host: prox-dev

  - name: Skazki
    icon: book-open
    description: "AI-генератор детских сказок"
    urls:
      web: https://skazki.core-stack.ru
      api: https://skazki-api.core-stack.ru
    services:
      user: []
    host: prox-dev

  - name: Kraеved
    icon: map-pin
    description: "AI-путеводитель по России"
    urls:
      web: https://kraeved.core-stack.ru
      api: https://kraeved-api.core-stack.ru
    services:
      user: []
    host: prox-dev

  - name: Logist23
    icon: clipboard-list
    description: "Управление грузоперевозками"
    urls:
      web: https://logist23.core-stack.ru
      api: https://logist23-api.core-stack.ru
    services:
      user: []
    host: prox-dev

infrastructure:
  # prox-dev (VM100)
  - name: PostgreSQL (dev)
    service: postgresql@16-main
    host: prox-dev
    port: 5432
    level: system

  - name: Redis (dev)
    service: redis-server
    host: prox-dev
    port: 6379
    level: system

  - name: nginx (dev)
    service: nginx
    host: prox-dev
    port: 80
    level: system

  - name: fail2ban (dev)
    service: fail2ban
    host: prox-dev
    level: system

  - name: SMB (dev)
    service: smbd
    host: prox-dev
    port: 445
    level: system

  # prox-infra (VM300)
  - name: PostgreSQL (infra)
    service: postgresql@16-main
    host: prox-infra
    port: 5432
    level: system

  - name: Redis (infra)
    service: redis-server
    host: prox-infra
    port: 6379
    level: system

  - name: nginx (infra)
    service: nginx
    host: prox-infra
    port: 80
    level: system

  - name: Grafana
    service: grafana-server
    host: prox-infra
    port: 3200
    level: system

  - name: Prometheus
    service: prometheus
    host: prox-infra
    port: 9090
    level: system

  - name: Docker (infra)
    service: docker
    host: prox-infra
    level: system

  # prox-prod (VM200)
  - name: nginx (prod)
    service: nginx
    host: prox-prod
    port: 80
    level: system

  - name: SMB (prod)
    service: smbd
    host: prox-prod
    port: 445
    level: system

  - name: fail2ban (prod)
    service: fail2ban
    host: prox-prod
    level: system

