  - name: Racia
    icon: radio
    description: "WiFi PTT + BLE mesh, аналог Zello для РФ"
    purpose: "Push-to-talk рация поверх WiFi и BLE-меш для складов, стройплощадок, охраны. Работает без интернета."
    urls:
