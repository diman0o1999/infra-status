        - emedic-queue
    host: prox-dev

  - name: Skazki
    icon: book-open
    description: "AI-генератор детских сказок"
    purpose: "Родитель задаёт имя ребёнка, тему, мораль — AI генерирует уникальную иллюстрированную сказку за 30 секунд."
