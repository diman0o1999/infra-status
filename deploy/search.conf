server {
    server_name search.core-stack.ru;
    location / {
        proxy_pass http://127.0.0.1:7700;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/search.core-stack.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/search.core-stack.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = search.core-stack.ru) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name search.core-stack.ru;
    return 404;
}
